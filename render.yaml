services:
  - type: web
    name: nanoreview-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: nanoreview-api
          property: host
