services:
  - type: web
    name: nanoreview-api
    env: node
    plan: free
    buildCommand: npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.browsers npx playwright install chromium
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
