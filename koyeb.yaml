name: nanoreview-api
services:
  - name: api
    type: web
    dockerfile: Dockerfile
    ports:
      - port: 3000
        protocol: http
    env:
      - key: PORT
        value: "3000"
    regions:
      - sin  # Singapore — fastest from India
    instance_type: nano  # Free tier (512MB RAM, 0.1 vCPU)
